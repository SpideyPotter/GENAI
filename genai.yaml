apiVersion: v1
kind: Pod
metadata:
  name: genai
  labels:
    app: genai_app
    app.kubernetes.io/name: local-storage   # REQUIRED in your cluster

spec:
  containers:
    - name: pytorch
      image: bmu-headnode:9443/nvcr.io/nvidia/pytorch:24.10-py3

      command: ["/bin/bash", "-c", "while true; do sleep 3600; done"]

      workingDir: /workspace
      tty: true
      stdin: true

      resources:
        requests:
          cpu: "16"
          memory: "32Gi"
          nvidia.com/mig-3g.71gb: 1   # FIXED (int, not string)
        limits:
          cpu: "16"
          memory: "32Gi"
          nvidia.com/mig-3g.71gb: 1

      volumeMounts:
        - name: genai-storage
          mountPath: /workspace

        - name: dshm
          mountPath: /dev/shm

      env:
        # Fix pip + user issues
        - name: HOME
          value: /workspace

        - name: GENAI_CACHE
          value: "disk"

        - name: GENAI_BATCH
          value: "4"

        - name: GENAI_WORKERS
          value: "8"   # safer than 12

        - name: TRAINING_EMAIL_CONFIG
          value: ".training_email_config"

  volumes:
    - name: genai-storage
      hostPath:
        path: /home/dgx-s-bmu-soet-230557/genai
        type: Directory

    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi

